services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/migrations:/migrations:ro
    networks:
      - rag_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - rag_net
    mem_limit: 8g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ${DATA_PATH}:/data/pdfs:ro
    networks:
      - rag_net
    env_file: .env

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - rag_net
      - rag_ext
    env_file: .env

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - rag_ext

volumes:
  pg_data:
  ollama_models:

networks:
  rag_net:
    driver: bridge
    internal: true
  rag_ext:
    driver: bridge
