# Override: adds Nginx reverse proxy with self-signed TLS for local deployment.
# Automatically merged with docker-compose.yml by Docker Compose.
#
# With this override active, access the app at:
#   Frontend: https://localhost
#   API:      https://localhost:8443

services:
  # Generate self-signed certs on startup, then exit
  certgen:
    image: alpine/openssl:latest
    volumes:
      - certs:/certs
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /certs/selfsigned.crt ]; then
          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout /certs/selfsigned.key \
            -out /certs/selfsigned.crt \
            -subj "/C=US/ST=Local/L=Local/O=GroundHog/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          chmod 644 /certs/selfsigned.crt
          chmod 600 /certs/selfsigned.key
          echo "Self-signed certificate generated."
        else
          echo "Certificate already exists, skipping."
        fi
    networks: []

  nginx:
    image: nginx:alpine
    depends_on:
      certgen:
        condition: service_completed_successfully
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:443:443"
      - "127.0.0.1:8443:8443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    networks:
      - rag_ext
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:443/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Direct ports from docker-compose.yml remain as fallback.
  # Prefer Nginx endpoints: https://localhost and https://localhost:8443

volumes:
  certs:
